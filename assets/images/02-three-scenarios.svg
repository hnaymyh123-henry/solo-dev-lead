<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="card"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/></filter>
  </defs>

  <rect width="1200" height="500" rx="16" fill="url(#bg)"/>

  <text x="600" y="42" text-anchor="middle" fill="#e6edf3" font-size="22" font-weight="700" font-family="Arial, sans-serif">三个演示场景</text>
  <text x="600" y="66" text-anchor="middle" fill="#8b949e" font-size="13" font-family="Arial, sans-serif">覆盖新项目启动、Bug 修复、代码重构三种典型开发场景</text>

  <!-- Card 1: New Project -->
  <g transform="translate(30, 90)">
    <rect width="360" height="370" rx="12" fill="rgba(88,166,255,0.04)" stroke="rgba(88,166,255,0.25)" stroke-width="1.5" filter="url(#card)"/>
    <rect width="360" height="44" rx="12" fill="rgba(88,166,255,0.1)"/>
    <rect y="36" width="360" height="8" fill="rgba(88,166,255,0.1)"/>
    <text x="30" y="28" fill="#58a6ff" font-size="14" font-weight="700" font-family="Arial, sans-serif">🆕 场景一：新项目启动</text>

    <text x="30" y="80" fill="#e6edf3" font-size="16" font-weight="600" font-family="Arial, sans-serif">密码生成器 CLI 工具</text>
    <text x="30" y="105" fill="#8b949e" font-size="12" font-family="Arial, sans-serif">从零搭建，使用 Python secrets 模块保证密码安全</text>

    <line x1="30" y1="120" x2="330" y2="120" stroke="rgba(88,166,255,0.1)" stroke-width="1"/>

    <text x="30" y="148" fill="#8b949e" font-size="11" font-family="Arial, sans-serif">需求输入：</text>
    <text x="40" y="168" fill="#e6edf3" font-size="11" font-family="Arial, sans-serif">"我想做一个命令行密码生成器"</text>

    <text x="30" y="200" fill="#8b949e" font-size="11" font-family="Arial, sans-serif">Skill 驱动流程：</text>
    <text x="40" y="220" fill="#e6edf3" font-size="11" font-family="Arial, sans-serif">Phase 0 分类 → Phase 1 对齐 5 参数</text>
    <text x="40" y="240" fill="#e6edf3" font-size="11" font-family="Arial, sans-serif">Phase 2 架构决策 + 2 张任务卡</text>
    <text x="40" y="260" fill="#e6edf3" font-size="11" font-family="Arial, sans-serif">Phase 3 实现 → Phase 4 评审 → Phase 5 复盘</text>

    <rect x="30" y="282" width="160" height="22" rx="5" fill="rgba(63,185,80,0.1)" stroke="rgba(63,185,80,0.2)"/>
    <text x="110" y="297" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="600" font-family="Arial, sans-serif">✅ 77 行 / 0 依赖</text>

    <text x="30" y="332" fill="#8b949e" font-size="10" font-family="Arial, sans-serif">产出：passgen.py（argparse + secrets）</text>
    <text x="30" y="350" fill="#8b949e" font-size="10" font-family="Arial, sans-serif">Counterexample 6/6 通过，Review 12/12</text>
  </g>

  <!-- Card 2: Bug Fix -->
  <g transform="translate(420, 90)">
    <rect width="360" height="370" rx="12" fill="rgba(248,81,73,0.04)" stroke="rgba(248,81,73,0.25)" stroke-width="1.5" filter="url(#card)"/>
    <rect width="360" height="44" rx="12" fill="rgba(248,81,73,0.1)"/>
    <rect y="36" width="360" height="8" fill="rgba(248,81,73,0.1)"/>
    <text x="30" y="28" fill="#f85149" font-size="14" font-weight="700" font-family="Arial, sans-serif">🐛 场景二：Bug 修复</text>

    <text x="30" y="80" fill="#e6edf3" font-size="16" font-weight="600" font-family="Arial, sans-serif">计算器除零崩溃修复</text>
    <text x="30" y="105" fill="#8b949e" font-size="12" font-family="Arial, sans-serif">修复 3 个 Bug，13 个边界场景全覆盖</text>

    <line x1="30" y1="120" x2="330" y2="120" stroke="rgba(248,81,73,0.1)" stroke-width="1"/>

    <text x="30" y="148" fill="#8b949e" font-size="11" font-family="Arial, sans-serif">Bug 清单：</text>
    <text x="40" y="168" fill="#f85149" font-size="11" font-family="Arial, sans-serif">❌ div 10 0 → ZeroDivisionError 崩溃</text>
    <text x="40" y="188" fill="#f85149" font-size="11" font-family="Arial, sans-serif">❌ 负数/超大数无输入验证</text>
    <text x="40" y="208" fill="#d2991d" font-size="11" font-family="Arial, sans-serif">⚠ multiply 大数精度丢失风险</text>

    <text x="30" y="242" fill="#8b949e" font-size="11" font-family="Arial, sans-serif">修复后：</text>
    <text x="40" y="262" fill="#3fb950" font-size="11" font-family="Arial, sans-serif">✅ divide() 检查 b==0 → 友好错误提示</text>
    <text x="40" y="282" fill="#3fb950" font-size="11" font-family="Arial, sans-serif">✅ 新增 validate_input() 边界检查</text>

    <rect x="30" y="305" width="160" height="22" rx="5" fill="rgba(63,185,80,0.1)" stroke="rgba(63,185,80,0.2)"/>
    <text x="110" y="320" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="600" font-family="Arial, sans-serif">✅ 13 场景全通过</text>

    <text x="30" y="352" fill="#8b949e" font-size="10" font-family="Arial, sans-serif">6 处精确编辑，未改变 CLI 接口</text>
  </g>

  <!-- Card 3: Refactor -->
  <g transform="translate(810, 90)">
    <rect width="360" height="370" rx="12" fill="rgba(163,113,247,0.04)" stroke="rgba(163,113,247,0.25)" stroke-width="1.5" filter="url(#card)"/>
    <rect width="360" height="44" rx="12" fill="rgba(163,113,247,0.1)"/>
    <rect y="36" width="360" height="8" fill="rgba(163,113,247,0.1)"/>
    <text x="30" y="28" fill="#a371f7" font-size="14" font-weight="700" font-family="Arial, sans-serif">🔧 场景三：重构</text>

    <text x="30" y="80" fill="#e6edf3" font-size="16" font-weight="600" font-family="Arial, sans-serif">天气脚本模块化重构</text>
    <text x="30" y="105" fill="#8b949e" font-size="12" font-family="Arial, sans-serif">88 行大泥球 → 7 模块包，20 测试全绿</text>

    <line x1="30" y1="120" x2="330" y2="120" stroke="rgba(163,113,247,0.1)" stroke-width="1"/>

    <text x="30" y="148" fill="#8b949e" font-size="11" font-family="Arial, sans-serif">重构前：</text>
    <text x="40" y="168" fill="#f85149" font-size="11" font-family="Arial, sans-serif">weather.py 88行 main() 包含全部逻辑</text>
    <text x="40" y="188" fill="#f85149" font-size="11" font-family="Arial, sans-serif">0 测试，裸 except Exception</text>

    <text x="30" y="222" fill="#8b949e" font-size="11" font-family="Arial, sans-serif">重构后：</text>
    <text x="40" y="242" fill="#3fb950" font-size="11" font-family="Arial, sans-serif">weather/ 包：7 模块，关注点分离</text>
    <text x="40" y="262" fill="#3fb950" font-size="11" font-family="Arial, sans-serif">20 单元测试 + WeatherAPIError 分层异常</text>

    <rect x="30" y="285" width="160" height="22" rx="5" fill="rgba(63,185,80,0.1)" stroke="rgba(63,185,80,0.2)"/>
    <text x="110" y="300" text-anchor="middle" fill="#3fb950" font-size="11" font-weight="600" font-family="Arial, sans-serif">✅ 8 张任务卡完成</text>

    <text x="30" y="332" fill="#8b949e" font-size="10" font-family="Arial, sans-serif">CLI 行为完全不变，8 个关注点独立可测</text>
    <text x="30" y="350" fill="#8b949e" font-size="10" font-family="Arial, sans-serif">Phase 2 依赖排序保证安全重构</text>
  </g>
</svg>