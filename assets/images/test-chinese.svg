  <text x="400" y="80" text-anchor="middle" fill="#8b949e" font-size="13" font-family="Arial, sans-serif">测试：空输入</text>
  <text x="400" y="110" text-anchor="middle" fill="#8b949e" font-size="13" font-family="Arial, sans-serif">测试：除零崩溃</text>
  <text x="400" y="140" text-anchor="middle" fill="#8b949e" font-size="13" font-family="Arial, sans-serif">测试：负数输入</text>
